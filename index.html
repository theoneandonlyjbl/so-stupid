<!DOCTYPE html>
<html>
<head>
<title>The Owl Chamber</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Georgia, serif;
    text-align:center;
}

.container{
    margin-top:50px;
}

h1{
    font-size:3em;
}

video{
    width:80%;
    max-width:900px;
    border-radius:15px;
    box-shadow:0 0 30px rgba(255,255,255,.3);
    margin-top:-40px;  /* THIS pulls it upward */
}

.quote{
    margin-top:20px;
    font-style:italic;
    opacity:.8;
}
</style>
</head>

<body>

<div class="container">

<h1>🦉 The Owl Chamber 🦉</h1>

<p>
You have discovered the hidden owl.
</p>

<!-- CLICK OVERLAY -->
<div id="overlay" onclick="startVideo()"
style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
font-size:2em;
cursor:pointer;
z-index:10;
">
CLICK HERE
</div>

<!-- VIDEO -->
<video id="owlVideo" playsinline>
    <source src="owl.mp4" type="video/mp4">
</video>

<!-- SCRIPT -->
<script>
function startVideo() {
    const video = document.getElementById("owlVideo");
    const overlay = document.getElementById("overlay");

    setTimeout(() => {
        video.muted = false;
        video.play();
        overlay.style.display = "none";
    }, 1000);
}
</script>

<div class="quote">
"The forest knows."
</div>

</div>

</body>
</html>
