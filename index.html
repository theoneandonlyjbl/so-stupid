<!DOCTYPE html>
<html>
<head>
<title>The Owl Chamber</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    font-family:Georgia, serif;
    text-align:center;
    overflow:hidden;
}

#pageContent{
    transition:transform 1s ease;
}

.centerBanner{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    display:flex;
    align-items:center;
    gap:40px;
    z-index:2;
}

.centerBanner h1{
    margin:0;
    font-size:3em;
    white-space:nowrap;
}

.sideOwl{
    width:180px;
    border-radius:15px;
    box-shadow:0 0 30px rgba(255,255,255,.3);
}

#owlVideo{
    width:80%;
    max-width:900px;
    border-radius:15px;
    box-shadow:0 0 30px rgba(255,255,255,.3);
    margin-top:120px;
    transform:scale(0.60);
}

.quote{
    margin-top:20px;
    font-style:italic;
    opacity:.8;
}

#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:2em;
    cursor:pointer;
    z-index:10;
}

</style>
</head>

<body>

<div id="pageContent">

<div class="centerBanner">

    <video class="sideOwl" autoplay muted loop playsinline>
        <source src="owl.mp4" type="video/mp4">
    </video>

    <h1>🦉 The Owl Chamber 🦉</h1>

    <video class="sideOwl" autoplay muted loop playsinline>
        <source src="owl.mp4" type="video/mp4">
    </video>

</div>

<div id="overlay" onclick="startVideo()">
    CLICK HERE
</div>

<video id="owlVideo" playsinline>
    <source src="owl.mp4" type="video/mp4">
</video>

<div class="quote">
"The forest knows."
</div>

</div>

<script>

function startVideo() {

    const video = document.getElementById("owlVideo");
    const overlay = document.getElementById("overlay");
    const page = document.getElementById("pageContent");

    page.style.transform = "scale(0.5)";
    page.style.transformOrigin = "top center";

    setTimeout(() => {
        video.muted = false;
        video.play();
        overlay.style.display = "none";
    }, 1000);

}

</script>

</body>
</html>
