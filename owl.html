<!DOCTYPE html>
<html>
<head>
<title>The Owl</title>

<style>

body{
    margin:0;
    background:black;
    color:white;
    text-align:center;
}


.container{
    position:relative;
    margin-top:40px;
}

/* Instruction text */
.instruction{
    color:white;
    font-size:1.5em;
    margin-bottom:20px;
    opacity:0.8;
}

/* Image */
img{
    max-width:90vw;
}

/* Clickable head zone */
.head-click{
    position:absolute;
    top:18%;
    left:38%;
    width:25%;
    height:25%;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

    <!-- INSTRUCTION TEXT -->
    <div class="instruction">
    The owl is watching.<br>
    It knows you are here.<br><br>
    Only the watched may proceed.<br>
    Click its head.
</div>

    <!-- OWL IMAGE -->
    <img src="barred_owl_extreme_hd.png">

    <!-- CLICK ZONE -->
    <a href="index.html" class="head-click"></a>

</div>

</body>
