<!DOCTYPE html>
<html>
<head>
<title>The Owl</title>

<style>
body{
    margin:0;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    position:relative;
}

/* Owl image */
img{
    max-width:90vw;
}

/* Clickable head zone */
.head-click{
    position:absolute;
    top:18%;
    left:38%;
    width:25%;
    height:25%;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

    <!-- INSTRUCTION TEXT -->
    <div class="instruction">
        Click the owl's head
    </div>

    <!-- OWL IMAGE -->
    <img src="barred_owl_extreme_hd.png">

    <!-- CLICK ZONE -->
    <a href="index.html" class="head-click"></a>

</div>

</body>
